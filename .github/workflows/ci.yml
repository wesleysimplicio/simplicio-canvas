name: CI

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:compatibility
      - run: npm run benchmark:render
      - run: npm run benchmark:webgl
      - run: npm run build
      - run: npm run verify:pwa
      - run: npm run verify:readiness
      - name: Open a sanitized regression issue
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly compatibility regression (${context.sha.slice(0, 7)})`
            const body = [
              'Automated nightly compatibility/readiness verification failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              '',
              'This report intentionally contains metadata only; repository source is never attached.'
            ].join('\n')
            const existing = await github.paginate(github.rest.issues.listForRepo, { owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'nightly-regression', per_page: 100 })
            if (!existing.some((issue) => issue.title === title)) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['nightly-regression'] })
            }
