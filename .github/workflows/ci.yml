name: CI

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:compatibility
      - run: npm run benchmark:render
      - run: npm run benchmark:webgl
      - run: npm run build
      - run: npm run verify:pwa
