name: Signed extension release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  package-sign-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: node scripts/package-extension.mjs
      - run: sha256sum extension/artifacts/*.vsix | awk '{print $1"  "$2}' > extension/artifacts/simplicio-canvas-0.1.0.vsix.sha256
      - run: node scripts/verify-artifact.mjs extension/artifacts/simplicio-canvas-0.1.0.vsix --require-checksum --sbom=extension/artifacts/simplicio-canvas.sbom.json
      - run: node scripts/verify-runtime-budgets.mjs dist
      - uses: sigstore/cosign-installer@v3.8.1
      - name: Sign with Cosign keyless or Minisign credentials
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          artifact=extension/artifacts/simplicio-canvas-0.1.0.vsix
          if command -v cosign >/dev/null 2>&1; then
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          elif command -v minisign >/dev/null 2>&1 && [ -n "${MINISIGN_SECRET_KEY}" ]; then
            minisign -Sm "$artifact" -s "${MINISIGN_SECRET_KEY}"
          else
            echo '::error::No Cosign binary/OIDC or Minisign binary+secret key available; refusing unsigned release.'
            exit 1
          fi
      - name: Verify signature exists
        env:
          MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}
        run: |
          artifact=extension/artifacts/simplicio-canvas-0.1.0.vsix
          if test -s "${artifact}.sigstore.json"; then
            cosign verify-blob --bundle "${artifact}.sigstore.json" --certificate-identity-regexp '.*' --certificate-oidc-issuer-regexp '.*' "$artifact"
          elif test -s "${artifact}.minisig" && command -v minisign >/dev/null 2>&1 && [ -n "${MINISIGN_PUBLIC_KEY:-}" ]; then
            minisign -Vm "$artifact" -p "${MINISIGN_PUBLIC_KEY}"
          else
            echo '::error::Signature receipt or verification key missing'; exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: simplicio-canvas-extension-${{ github.ref_name }}
          path: extension/artifacts/*
