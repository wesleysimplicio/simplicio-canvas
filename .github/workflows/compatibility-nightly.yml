name: Mapper compatibility nightly

on:
  schedule:
    - cron: '41 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - name: Install the pinned Mapper adapter
        run: python -m pip install --upgrade simplicio-mapper
      - name: Scan public repositories without retaining source
        run: >-
          npm run scan:mapper:matrix --
          --ids=simplicio-loop,requests,vite,spring-petclinic,free-programming-books
          --determinism
          --output=output/compatibility-nightly.json
      - name: Validate metadata-only report
        run: node scripts/verify-compatibility.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-nightly-${{ github.run_id }}
          path: output/compatibility-nightly.json
          retention-days: 14
